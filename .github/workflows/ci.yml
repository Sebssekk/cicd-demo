name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main
      - 'feature-*'       
    paths-ignore:
      - 'README.md'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main               

# ---------------------------------------------------------
# Concurrency: Cancel older runs if a new commit is pushed
# ---------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # JOB 1: Validation (Lint, Test, and Compile)
  # Runs on EVERYTHING (Feature branches, PRs, Main, and Tags)
  # =========================================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Concept: Explicit Tool-Agnostic Caching
      - name: 💾 Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          # The key forces a clean download ONLY if package-lock.json changes
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # 'npm ci' now leverages the cached global npm directory
      - name: Install Dependencies
        run: npm ci          

      - name: 🛠️ Run Code Linter
        run: npm run lint

      - name: 🧪 Run Test Suite
        run: npm run test

      - name: 📦 Compile TypeScript (tsgo)
        run: npm run build

      # Concept: Sharing files between isolated Jobs
      # We upload the compiled 'dist' folder so later deployment jobs can grab it.
      - name: 📤 Upload Compiled Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-application
          path: dist/
          retention-days: 1 # Clean up quickly to save storage

  # =========================================================
  # JOB 2: Staging Deployment
  # Runs ONLY on pushes/merges directly to the main branch
  # =========================================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: validate # Forces this job to wait until validation passes!
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Download Compiled Artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-application
          path: dist/

      - name: 🔍 Verify Artifact Contents
        run: |
          echo "========================================"
          echo "VERIFYING DOWNLOADED ARTIFACT"
          echo "========================================"
          echo "Current working directory structure:"
          ls -R dist/
          echo "========================================"
          
      - name: 🚀 Deploying to Staging Environment
        run: |
          echo "Code on main branch has been fully validated by Job 1."
          echo "[*** MOCK ***] Executing staging deployment scripts..."

  # =========================================================
  # JOB 3: Production Release (Docker Push)
  # Runs ONLY when a release tag is pushed (e.g., v1.0.0)
  # =========================================================
  release-production:
    runs-on: ubuntu-latest
    needs: validate 
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Because this is a totally different VM, we must pull the 'dist'
      # folder that Job 1 built, rather than compiling it again.
      - name: 📥 Download Compiled Artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-application
          path: dist/

      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 📦 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/express-cicd-demo:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/express-cicd-demo:latest