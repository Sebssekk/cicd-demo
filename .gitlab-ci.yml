# ---------------------------------------------------------
# Global Setup & Architecture Definition
# ---------------------------------------------------------
stages:
  - validate
  - deploy
  - release

variables:
  # Crucial for caching: Tell npm to save its global cache inside the project folder
  # so the GitLab Runner can physically find it and cache it.
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  # Required variables for secure Docker-in-Docker execution
  DOCKER_TLS_CERTDIR: "/certs"

# =========================================================
# JOB 1: Validation (Lint, Test, and Compile)
# Runs on EVERYTHING (Feature branches, MRs, Main, and Tags)
# =========================================================
validate_code:
  stage: validate
  image: node:24-alpine
  
  # Concurrency Control: Allows older running instances of this job 
  # to be automatically canceled if a developer pushes a newer commit.
  interruptible: true

  # Concept: Tool-Agnostic Caching
  cache:
    # This key tracks the package-lock hash. If it changes, cache breaks.
    key:
      files:
        - package-lock.json
    paths:
      - .npm/

  script:
    - npm ci
    - npm run lint
    - npm run test
    - npm run build

  # Concept: Sharing files between isolated Job Containers
  artifacts:
    name: "compiled-application-$CI_COMMIT_REF_SLUG"
    paths:
      - dist/
    expire_in: 1 day # Clean up quickly to save GitLab server storage

  rules:
    # Explicitly define the 4 triggers
    - if: $CI_COMMIT_BRANCH =~ /^feature-/                  # 1. Feature-* branches
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"      # 2. Merge Requests
    - if: $CI_COMMIT_BRANCH == "main"                       # 3. Pushes to Main
    - if: $CI_COMMIT_TAG =~ /^v/                            # 4. Release Tags (e.g., v1.0.0)

# =========================================================
# JOB 2: Staging Deployment
# Runs ONLY on pushes/merges directly to the main branch
# =========================================================
deploy_staging:
  stage: deploy
  image: alpine:latest # Lightweight linux image since we are just validating scripts
  
  # This makes the job explicit: download artifacts ONLY from validate_code
  dependencies:
    - validate_code

  script:
    - echo "========================================"
    - echo "VERIFYING DOWNLOADED ARTIFACT"
    - echo "========================================"
    - echo "Current working directory structure:"
    - ls -R dist/
    - echo "========================================"
    - echo "Code on main branch has been fully validated by Job 1."
    - echo "Simulating staging deployment using the verified files above..."

  rules:
    # Only run on main branch pushes (excluding MR pipelines targeting main)
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE != "merge_request_event"

# =========================================================
# JOB 3: Production Release (Docker Push)
# Runs ONLY when a release tag is pushed (e.g., v1.0.0)
# =========================================================
release_production:
  stage: release
  # To run 'docker' commands inside a GitLab container, we use Docker-in-Docker (dind)
  image: docker:24-dind
  services:
    - docker:24-dind

  dependencies:
    - validate_code # Pulls down the compiled 'dist/' folder seamlessly

  before_script:
    # Wait briefly for the Docker daemon service to boot up completely, then log in securely
    - sleep 3
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

  script:
    # Instead of marketplace plugins, we use raw, native Docker commands
    - docker build -t $DOCKERHUB_USERNAME/express-cicd-demo:$CI_COMMIT_TAG .
    - docker tag $DOCKERHUB_USERNAME/express-cicd-demo:$CI_COMMIT_TAG $DOCKERHUB_USERNAME/express-cicd-demo:latest
    - docker push $DOCKERHUB_USERNAME/express-cicd-demo:$CI_COMMIT_TAG
    - docker push $DOCKERHUB_USERNAME/express-cicd-demo:latest

  rules:
    # Fixes the blindspot: Only runs on tags, but implicitly waits for 'validate' stage to pass
    - if: $CI_COMMIT_TAG =~ /^v/